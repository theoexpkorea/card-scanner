<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>명함 스캔</title>
<link rel="icon" href="favicon.ico?v=2" sizes="any">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root{
    --ink:#15181E;
    --header:#14161C;
    --header2:#1C1F27;
    --accent:#2746E6;
    --accent-dark:#1B33B0;
    --gray:#6B7280;
    --gray-light:#9CA3AF;
    --line:#E7E8EC;
    --bg:#F4F5F7;
    --card-bg:#FFFFFF;
    --ok:#16A34A;
    --err:#DC2626;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html, body{
    overscroll-behavior-y:none;
  }
  body{
    margin:0;
    font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:48px;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  input, textarea{
    -webkit-user-select:text;
    user-select:text;
    -webkit-touch-callout:default;
  }

  header{
    background:#fff;
    color:var(--ink);
    padding:16px 20px 14px;
    padding-top:calc(16px + env(safe-area-inset-top,0px));
    border-bottom:1px solid var(--line);
  }
  .brand-row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand-row .brand{
    font-size:21px;
    font-weight:800;
    letter-spacing:-0.04em;
    color:var(--ink);
    line-height:1;
    cursor:pointer;
  }
  .brand-accent{
    color:var(--accent);
  }
  .brand-row .sub{
    font-size:11px;
    color:var(--gray);
    font-weight:600;
    letter-spacing:0.02em;
  }

  .segment{
    display:flex;
    background:var(--bg);
    margin:10px 20px 0;
    padding:4px;
    border-radius:12px;
  }
  .segment-btn{
    flex:1;
    padding:9px 0;
    text-align:center;
    background:transparent;
    border:none;
    color:var(--gray-light);
    font-size:13.5px;
    font-weight:600;
    border-radius:9px;
  }
  .segment-btn.active{
    background:#fff;
    color:var(--ink);
    border:1px solid var(--line);
  }

  .container{max-width:480px;margin:0 auto;padding:14px 16px 16px;}

  /* 명함 표준 비율 85.6:54 ≈ 1.586:1 로 고정된 촬영 프레임 */
  .camera-box{
    background:#000;
    border-radius:16px;
    aspect-ratio:1.586/1;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
    overflow:hidden;
    position:relative;
    box-shadow:0 1px 2px rgba(0,0,0,0.06);
  }
  .camera-box.idle{
    background:#fff;
    border:1.5px dashed #D1D5DB;
    cursor:pointer;
  }
  #video, #resultImg{
    width:100%;height:100%;object-fit:cover;
    display:none;
  }
  .camera-box .placeholder{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:var(--gray);
    text-align:center;
    padding:20px;
  }
  .camera-box .placeholder svg{width:36px;height:36px;stroke:var(--gray-light);margin-bottom:8px;}
  .camera-box .placeholder .title{font-size:14.5px;font-weight:600;color:var(--ink);}
  .camera-box .placeholder .hint{font-size:12.5px;margin-top:4px;color:var(--gray);}
  .guide-frame{
    position:absolute;
    inset:6%;
    border:2px dashed rgba(255,255,255,0.85);
    border-radius:10px;
    pointer-events:none;
    display:none;
  }
  .guide-label{
    position:absolute;
    top:8px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.55);color:#fff;
    padding:4px 12px;border-radius:20px;
    font-size:11.5px;
    display:none;
    white-space:nowrap;
  }
  .capture-btn{
    position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    width:56px;height:56px;border-radius:50%;
    background:#fff;border:4px solid rgba(255,255,255,0.4);
    display:none;
  }
  .retake{
    position:absolute;bottom:16px;right:14px;
    background:rgba(0,0,0,0.6);color:#fff;
    padding:8px 14px;border-radius:20px;font-size:12.5px;
    display:none;
  }
  .gallery-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    width:100%;
    margin-top:10px;
    padding:11px;
    background:transparent;
    border:1.5px dashed var(--line);
    border-radius:11px;
    color:var(--gray);
    font-size:13.5px;
    font-weight:600;
  }
  .gallery-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;}
  .gallery-btn:active{background:var(--bg);}
  .native-fallback{
    position:absolute;bottom:16px;left:14px;
    background:rgba(0,0,0,0.5);color:#fff;
    padding:6px 12px;border-radius:20px;font-size:11.5px;
    display:none;
  }
  .focus-ring{
    position:absolute;
    width:64px;height:64px;
    margin-left:-32px;margin-top:-32px;
    border:2px solid #FFD400;
    border-radius:8px;
    pointer-events:none;
    animation:focusPulse 0.7s ease-out;
  }
  @keyframes focusPulse{
    0%{transform:scale(1.3);opacity:1;}
    100%{transform:scale(1);opacity:0;}
  }

  .field{margin-top:16px;}
  .field label{
    display:block;font-size:12.5px;font-weight:700;color:var(--gray);
    margin-bottom:6px;
    letter-spacing:-0.1px;
  }
  .field .required{color:var(--accent);font-weight:700;}
  .field input{
    width:100%;
    padding:13px 14px;
    border:1.5px solid var(--line);
    border-radius:11px;
    font-size:15.5px;
    background:#fff;
    color:var(--ink);
    -webkit-appearance:none;
    appearance:none;
  }
  .field input:focus{
    outline:none;border-color:var(--accent);
  }

  /* 커스텀 드롭다운 (네이티브 select 대체) */
  .dd{position:relative;}
  .dd-btn{
    width:100%;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:13px 14px;
    border:1.5px solid var(--line);
    border-radius:11px;
    background:#fff;
    font-size:15.5px;
    color:var(--ink);
    text-align:left;
  }
  .dd-btn .dd-label.placeholder{color:var(--gray-light);}
  .dd-btn svg{flex-shrink:0;width:16px;height:16px;stroke:var(--gray);transition:transform .15s;}
  .dd-btn.open svg{transform:rotate(180deg);}
  .dd-panel{
    position:absolute;
    top:calc(100% + 6px);
    left:0;right:0;
    background:#fff;
    border-radius:13px;
    box-shadow:0 10px 30px rgba(15,17,24,0.16);
    border:1px solid var(--line);
    max-height:280px;
    overflow-y:auto;
    z-index:80;
    display:none;
    padding:6px;
  }
  .dd-panel.open{display:block;}
  .dd-item{
    padding:12px 12px;
    font-size:14.5px;
    border-radius:9px;
    display:flex;justify-content:space-between;align-items:center;
    color:var(--ink);
  }
  .dd-item:active{background:var(--bg);}
  .dd-item.selected{color:var(--accent);font-weight:700;background:#EEF3FF;}

  .submit-btn{
    width:100%;
    margin-top:24px;
    padding:16px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:13px;
    font-size:15.5px;
    font-weight:700;
    letter-spacing:-0.2px;
  }
  .submit-btn:disabled{background:#B0B4BD;}
  .submit-btn:active{background:var(--accent-dark);}

  .toast{
    position:fixed;
    bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:10px;
    font-size:13.5px;
    display:none;
    align-items:center;
    max-width:90%;
    text-align:center;
    z-index:100;
    box-shadow:0 6px 20px rgba(0,0,0,0.18);
  }
  .toast.show{display:inline-flex;}
  .toast .dot{
    width:7px;height:7px;border-radius:50%;
    margin-right:9px;flex-shrink:0;
    background:#9CA3AF;
  }
  .toast.ok .dot{background:#4ADE80;}
  .toast.err .dot{background:#F87171;}

  .filter-row{margin-bottom:14px;}

  .list-filters{
    position:sticky;
    top:0;
    z-index:55;
    background:var(--bg);
    margin:-14px -16px 0;
    padding:14px 16px 2px;
  }
  .list-filters .field:first-child label{margin-bottom:6px;}

  .property-filter-banner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:#EEF3FF;
    border:1px solid #C7D7FB;
    border-radius:11px;
    padding:11px 14px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
  }
  .property-filter-banner button{
    flex-shrink:0;
    background:#fff;
    border:1px solid #C7D7FB;
    color:var(--accent);
    border-radius:8px;
    padding:5px 10px;
    font-size:12px;
    font-weight:700;
  }

  .card-item{
    display:flex;
    flex-direction:column;
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:14px;
    padding:11px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(15,17,24,0.05);
  }
  .card-item-link{
    display:flex;
    flex:1;
    min-width:0;
    gap:12px;
    text-decoration:none;
    color:var(--ink);
  }
  .card-item .thumb{
    width:80px;height:50px;
    border-radius:7px;
    object-fit:cover;
    background:#EDEEF1;
    flex-shrink:0;
  }
  .card-item .info{flex:1;min-width:0;}
  .card-item .info .name{font-weight:700;font-size:15px;letter-spacing:-0.2px;}
  .card-item .info .company{font-size:12.5px;color:var(--gray);margin-top:2px;}
  .card-item .info .meta{
    font-size:11px;color:var(--gray);margin-top:6px;
    display:flex;gap:5px;flex-wrap:wrap;
  }
  .card-item .info .meta span{
    background:var(--bg);
    padding:3px 8px;border-radius:7px;
    font-weight:600;
  }

  .empty-state{
    text-align:center;
    color:var(--gray);
    padding:60px 20px;
    font-size:13.5px;
  }

  .card-actions{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:6px;
    padding-top:8px;
    border-top:1px solid var(--line);
  }
  .sms-list-btn, .call-list-btn, .property-list-btn, .edit-list-btn, .delete-list-btn, .mail-list-btn{
    flex-shrink:0;
    width:38px;height:38px;
    border-radius:50%;
    background:var(--bg);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
  }
  .sms-list-btn svg, .call-list-btn svg, .property-list-btn svg, .edit-list-btn svg, .mail-list-btn svg{width:17px;height:17px;stroke:var(--gray);}
  .delete-list-btn svg{width:17px;height:17px;stroke:var(--err);}
  .call-list-btn:active, .sms-list-btn:active, .property-list-btn:active, .edit-list-btn:active, .mail-list-btn:active{background:var(--line);}
  .delete-list-btn:active{background:#FBE1E1;}

  .cancel-edit-btn{
    width:100%;
    margin-top:10px;
    padding:14px;
    background:#fff;
    color:var(--gray);
    border:1px solid var(--line);
    border-radius:13px;
    font-size:14.5px;
    font-weight:600;
  }
  .cancel-edit-btn:active{background:var(--bg);}

  .edit-banner{
    background:#EEF2FF;
    color:var(--accent-dark);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    font-weight:600;
    margin-bottom:14px;
  }

  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(15,17,21,0.5);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:200;
  }
  .modal-sheet{
    width:100%;max-width:480px;
    background:#fff;
    border-radius:20px 20px 0 0;
    max-height:88vh;
    overflow-y:auto;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom,0px));
  }
  .modal-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:14px;
  }
  .modal-title{font-size:16.5px;font-weight:800;color:var(--ink);}
  .modal-close{
    width:32px;height:32px;border-radius:50%;
    background:var(--bg);border:none;color:var(--gray);font-size:15px;
  }
  .modal-help{font-size:12.5px;color:var(--gray);line-height:1.5;margin-bottom:10px;}
  #bulkPropertyInput{
    width:100%;min-height:140px;
    border:1px solid var(--line);border-radius:11px;
    padding:12px;font-size:14px;font-family:inherit;
    resize:vertical;color:var(--ink);
  }
  .bulk-result-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 0;border-bottom:1px solid var(--line);
    font-size:13.5px;gap:10px;
  }
  .bulk-result-row:last-child{border-bottom:none;}
  .bulk-result-status{font-size:12px;font-weight:700;flex-shrink:0;}
  .bulk-status-updated{color:var(--ok);}
  .bulk-status-ambiguous{color:#B25B27;}
  .bulk-status-not_found{color:var(--err);}

  .sms-prompt{
    margin-top:16px;
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:13px;
    padding:16px;
    text-align:center;
  }
  .sms-prompt-text{
    font-size:13.5px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:12px;
  }
  .sms-send-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    padding:13px;
    background:var(--bg);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:11px;
    font-size:14px;
    font-weight:700;
    margin-bottom:8px;
  }
  .sms-send-btn svg{width:17px;height:17px;stroke:var(--accent);}
  .sms-send-btn:active{background:var(--line);}
  .sms-skip-btn{
    width:100%;
    padding:10px;
    background:transparent;
    border:none;
    color:var(--gray);
    font-size:13px;
    font-weight:600;
  }
  /* ---- 비밀번호 잠금 화면 ---- */
  #lockScreen{
    position:fixed; inset:0; z-index:999;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 24px;
    padding-top:calc(env(safe-area-inset-top,0px) + 32px);
  }
  #lockScreen .lock-logo{
    font-size:28px; font-weight:800; letter-spacing:-0.04em;
    margin-bottom:6px; color:var(--ink);
  }
  #lockScreen .lock-sub{
    font-size:13px; color:var(--gray); font-weight:600;
    margin-bottom:40px;
  }
  #lockScreen .lock-box{
    width:100%; max-width:320px;
    background:var(--card-bg); border-radius:18px;
    padding:28px 24px; box-shadow:0 8px 24px rgba(15,17,24,0.08);
    border:1px solid var(--line);
  }
  #lockScreen .lock-title{
    font-size:15px; font-weight:800; color:var(--ink);
    margin-bottom:16px; text-align:center;
  }
  #lockScreen .lock-input{
    width:100%; height:52px;
    border:1px solid var(--line); border-radius:12px;
    background:var(--bg); padding:0 16px;
    font-size:20px; font-family:inherit;
    text-align:center; letter-spacing:6px;
    outline:0; color:var(--ink);
    font-variant-numeric:tabular-nums;
    margin-bottom:12px;
    -webkit-user-select:text; user-select:text;
  }
  #lockScreen .lock-input:focus{border-color:var(--accent); background:#fff}
  #lockScreen .lock-btn{
    width:100%; height:52px; border:0; border-radius:13px;
    background:var(--ink); color:#fff;
    font-size:15.5px; font-weight:800;
    font-family:inherit; transition:.12s;
  }
  #lockScreen .lock-btn:active{opacity:.85}
  #lockScreen .lock-err{
    font-size:13px; font-weight:700; color:#E03A3A;
    text-align:center; margin-top:10px;
    min-height:20px;
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-logo">the<span class="brand-accent">o</span></div>
  <div class="lock-sub">명함스캔 · eXp Korea</div>
  <div class="lock-box">
    <div class="lock-title"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;vertical-align:-2px;margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>비밀번호를 입력하세요</div>
    <input id="lockInput" class="lock-input" type="password"
      inputmode="numeric" maxlength="8" placeholder=""
      autocomplete="new-password" autocorrect="off" spellcheck="false">
    <button class="lock-btn" id="lockBtn">확인</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<header>
  <div class="brand-row">
    <span class="brand" id="headerBrand">the<span class="brand-accent">o</span></span>
    <span class="sub">명함스캔 · eXp Korea</span>
  </div>
</header>
<div class="segment">
  <button class="segment-btn active" id="tabScanBtn">촬영</button>
  <button class="segment-btn" id="tabListBtn">목록</button>
</div>

<div class="container" id="scanTab">

  <div class="camera-box idle" id="cameraBox">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <div class="title">탭해서 명함 촬영</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <img id="resultImg" alt="촬영된 명함">
    <div class="guide-label" id="guideLabel">박스에 맞춰주세요 · 화면 탭하면 초점 재조정</div>
    <div class="guide-frame" id="guideFrame"></div>
    <button class="capture-btn" id="captureBtn"></button>
    <div class="native-fallback" id="nativeFallbackBtn">기본 카메라로 촬영</div>
    <div class="retake" id="retakeBtn">다시 찍기</div>
  </div>
  <canvas id="captureCanvas" style="display:none;"></canvas>
  <input type="file" id="fallbackInput" accept="image/*" capture="environment" style="display:none;">
  <input type="file" id="galleryInput" accept="image/*" style="display:none;">
  <button type="button" class="gallery-btn" id="galleryBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>갤러리에서 사진 선택</button>

  <div class="field">
    <label>이름 <span class="required">필수</span></label>
    <input type="text" id="name" placeholder="예: 김철수">
  </div>

  <div class="field">
    <label>회사명</label>
    <input type="text" id="company" placeholder="예: (주)한빛부동산">
  </div>

  <div class="field">
    <label>직함</label>
    <input type="text" id="title" placeholder="예: 대표이사">
  </div>

  <div class="field">
    <label>상대방 연락처 <span style="color:var(--gray-light);font-weight:600;">(선택, 입력하면 내 명함을 문자로 보낼 수 있어요)</span></label>
    <input type="tel" id="phone" placeholder="예: 010-1234-5678">
  </div>

  <div class="field">
    <label>이메일 <span style="color:var(--gray-light);font-weight:600;">(선택, 입력하면 목록에서 바로 메일을 보낼 수 있어요)</span></label>
    <input type="email" id="email" placeholder="예: name@company.com">
  </div>

  <div class="field">
    <label>그룹 <span class="required">필수</span></label>
    <div class="dd" id="ddGroup">
      <button type="button" class="dd-btn" id="ddGroupBtn">
        <span class="dd-label placeholder" id="ddGroupLabel">선택하세요</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dd-panel" id="ddGroupPanel"></div>
    </div>
  </div>

  <div class="field" id="subgroupField" style="display:none;">
    <label>소분류</label>
    <div class="dd" id="ddSubgroup">
      <button type="button" class="dd-btn" id="ddSubgroupBtn">
        <span class="dd-label placeholder" id="ddSubgroupLabel">선택하세요</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dd-panel" id="ddSubgroupPanel"></div>
    </div>
  </div>

  <div class="field" id="subsubgroupField" style="display:none;">
    <label>범주</label>
    <div class="dd" id="ddSubsubgroup">
      <button type="button" class="dd-btn" id="ddSubsubgroupBtn">
        <span class="dd-label placeholder" id="ddSubsubgroupLabel">선택하세요</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dd-panel" id="ddSubsubgroupPanel"></div>
    </div>
  </div>

  <div class="field" id="propertyNoField" style="display:none;">
    <label>관련 매물번호 <span style="color:var(--gray-light);font-weight:600;">(선택)</span></label>
    <input type="text" id="propertyNo" placeholder="예: 3204 (여러 개면 콤마로: 3204, A0002)">
  </div>

  <div class="edit-banner" id="editBanner" style="display:none;">명함 수정 중 · 사진을 다시 찍지 않으면 기존 사진이 유지됩니다</div>

  <button class="submit-btn" id="submitBtn">저장</button>
  <button class="cancel-edit-btn" id="cancelEditBtn" style="display:none;">수정 취소</button>

  <div class="sms-prompt" id="smsPrompt" style="display:none;">
    <div class="sms-prompt-text">저장 완료! 상대방에게 내 명함을 문자로 보낼까요?</div>
    <button class="sms-send-btn" id="smsSendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      문자로 명함 보내기
    </button>
    <button class="sms-skip-btn" id="smsSkipBtn">건너뛰기</button>
  </div>

</div>

<div class="container" id="listTab" style="display:none;">
  <div class="list-filters" id="listFilters">
    <div class="field">
      <label>이름 검색</label>
      <input type="text" id="searchInput" placeholder="이름으로 검색">
    </div>
    <div class="field filter-row">
      <label>그룹 필터</label>
      <div class="dd" id="ddFilter">
        <button type="button" class="dd-btn" id="ddFilterBtn">
          <span class="dd-label" id="ddFilterLabel">전체 보기</span>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dd-panel" id="ddFilterPanel"></div>
      </div>
    </div>
    <div class="field filter-row" id="filterSubField" style="display:none;">
      <label>소분류 필터</label>
      <div class="dd" id="ddFilterSub">
        <button type="button" class="dd-btn" id="ddFilterSubBtn">
          <span class="dd-label" id="ddFilterSubLabel">전체 보기</span>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dd-panel" id="ddFilterSubPanel"></div>
      </div>
    </div>
    <div class="field filter-row" id="filterSubsubField" style="display:none;">
      <label>범주 필터</label>
      <div class="dd" id="ddFilterSubsub">
        <button type="button" class="dd-btn" id="ddFilterSubsubBtn">
          <span class="dd-label" id="ddFilterSubsubLabel">전체 보기</span>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dd-panel" id="ddFilterSubsubPanel"></div>
      </div>
    </div>
  </div>
  <button type="button" class="gallery-btn" id="bulkPropertyBtn" style="border-style:solid;color:var(--accent);border-color:#C7D2FE;"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>매물번호 일괄 반영</button>
  <button type="button" class="gallery-btn" id="exportCsvBtn" style="border-style:solid;color:#4C7A3A;border-color:#C6E0B4;"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>아웃룩용 연락처 내보내기 (CSV)</button>
  <div id="propertyFilterBanner" style="display:none;"></div>
  <div id="listCountLabel" style="padding:10px 2px 10px;font-size:13px;color:#6B7280;font-weight:600;text-align:right;"></div>
  <div id="cardListContainer">
    <div class="empty-state">불러오는 중...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="bulkPropertyOverlay" style="display:none;">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">매물번호 일괄 반영</div>
      <button type="button" class="modal-close" id="bulkPropertyCloseBtn">✕</button>
    </div>
    <div class="modal-body" id="bulkPropertyStep1">
      <div class="modal-help">한 줄에 하나씩, <b>이름(또는 전화번호), 매물번호</b> 형식으로 붙여넣어주세요. 매물번호가 여러 개면 콤마로 이어 적으면 됩니다.</div>
      <textarea id="bulkPropertyInput" placeholder="이름 또는 전화번호, 매물번호"></textarea>
      <button type="button" class="submit-btn" id="bulkPropertyPreviewBtn" style="margin-top:14px;">매칭 확인</button>
    </div>
    <div class="modal-body" id="bulkPropertyStep2" style="display:none;">
      <div id="bulkPropertyResults"></div>
      <button type="button" class="submit-btn" id="bulkPropertyApplyBtn" style="margin-top:14px;">일괄 적용</button>
      <button type="button" class="cancel-edit-btn" id="bulkPropertyBackBtn" style="display:block;">다시 입력하기</button>
    </div>
  </div>
</div>

<script src="app.js?v=23"></script>
</body>
</html>
